server:
  port: 8080

spring:
  autoconfigure:
    exclude: []  # 启用全部自动配置

  data:
    redis:
      host: 39.108.71.237
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  datasource:
    url: jdbc:mysql://39.108.71.237:3306/ecommerce?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  rabbitmq:
    host: 39.108.71.237
    port: 5672
    username: admin
    password: admin123
    listener:
      simple:
        default-requeue-rejected: false  # 异常时不重新入队
    publisher-confirm-type: correlated   # 发送确认
    publisher-returns: true              # 路由失败通知

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ecommercesecretemcommercecret1234567890ecommercesecretemcommercecret
  expiration: 86400000  # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.javastudy.ecommerce

elasticsearch:
  host: 39.108.71.237
  port: 9200
